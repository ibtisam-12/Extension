<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: system-ui, sans-serif; width: 300px; padding: 12px; margin: 0; }
    button { width: 100%; margin-bottom: 8px; padding: 8px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    /* pre-line so \n in blocked-tab message renders as a line break */
    #tabInfo { font-size: 12px; color: #555; margin-bottom: 10px; word-break: break-all; white-space: pre-line; }
    #tabInfo.warn { color: #b45309; }
    #status { font-size: 12px; margin-top: 8px; }
    #results {
      font-size: 11px; margin-top: 8px; padding: 8px;
      background: #f4f4f5; border-radius: 6px; max-height: 120px;
      overflow: auto; word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="tabInfo">Checking current tab…</div>
  <button id="captureBtn">📸 Capture at 1920×1080</button>
  <div id="status"></div>
  <div id="results" hidden></div>
  <script src="popup.js"></script>
</body>
</html>
