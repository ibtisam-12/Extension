name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest.json
        run: python -c "import json; json.load(open('frontend/manifest.json')); print('OK')"
      - name: Check popup.html
        run: python -c "import html.parser; type('', (html.parser.HTMLParser,), {})().feed(open('frontend/popup.html').read()); print('OK')"
